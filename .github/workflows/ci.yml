name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build + static checks
        run: ./gradlew --no-daemon clean build ktlintCheck

      - name: Run IntelliJ plugin verifier
        shell: bash
        run: |
          set -euo pipefail

          if ./gradlew --no-daemon -q tasks --all | grep -qE '^verifyPlugin\s'; then
            TASK=verifyPlugin
          elif ./gradlew --no-daemon -q tasks --all | grep -qE '^runPluginVerifier\s'; then
            TASK=runPluginVerifier
          else
            echo "No plugin verifier task found"
            exit 1
          fi

          ./gradlew --no-daemon "$TASK"

